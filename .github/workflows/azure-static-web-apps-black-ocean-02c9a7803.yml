name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      # ── Frontend ──────────────────────────────────────────
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_OCEAN_02C9A7803 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./frontend" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "build" # Built app content directory - optional
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          ###### End of Repository/Build Configurations ######
      # ── Backend: DB Migration ──────────────────────────────
      - name: Install EF Tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore NuGet Packages
        run: dotnet restore
        working-directory: ./backend/FlashCardTool

      - name: Run Migrations
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          cd $GITHUB_WORKSPACE/backend/FlashCardTool/FlashCardTool
          dotnet ef database update \
            --startup-project FlashCardTool.API \
            --project FlashCardTool.Infrastructure
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.PROD_CONNECTION_STRING }}
      # ── Backend: Build & Push Docker Image ────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name flashcardsappacr

      - name: Build and Push Docker Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t flashcardsappacr.azurecr.io/flashcards-api:latest \
            --push \
            ./backend/FlashCardTool
      # ── Backend: Update Container App ─────────────────────
      - name: Update Container App
        run: |
          az containerapp update \
            --name flashcards-api \
            --resource-group flashcardsapp-rg \
            --image flashcardsappacr.azurecr.io/flashcards-api:latest

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_OCEAN_02C9A7803 }}
          action: "close"

